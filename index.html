<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download HXPainter</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --card-bg: #1e293b;
            --error-color: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            line-height: 1.6;
        }

        .container {
            background-color: var(--card-bg);
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            margin-top: 0;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        p {
            color: #94a3b8;
            margin-bottom: 2rem;
        }

        .download-btn {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: bold;
            font-size: 1.1rem;
            transition: background-color 0.2s ease, transform 0.1s ease;
            width: 100%;
            box-sizing: border-box;
        }

        .download-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .download-btn:active {
            transform: translateY(0);
        }

        .unsupported {
            color: var(--error-color);
            font-weight: bold;
            background-color: rgba(239, 68, 68, 0.1);
            padding: 1rem;
            border-radius: 0.5rem;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        #dynamic-content {
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🎨</div>
        <h1>HXPainter</h1>
        <p>A modern C++/Qt painting application.</p>

        <div id="dynamic-content">
            <!-- Content will be injected here by JavaScript -->
            <span style="color: #64748b;">Detecting your operating system...</span>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const contentDiv = document.getElementById('dynamic-content');
            const userAgent = window.navigator.userAgent.toLowerCase();
            
            // Simple OS detection
            const isWindows = userAgent.includes('windows') || userAgent.includes('win32');
            const isLinux = userAgent.includes('linux') && !userAgent.includes('android');

            if (isWindows) {
                contentDiv.innerHTML = `
                    <a href="HXPainter-Windows.tar.xz" class="download-btn">
                        Download for Windows (.tar.xz)
                    </a>
                `;
            } else if (isLinux) {
                contentDiv.innerHTML = `
                    <a href="HXPainter-Linux.tar.xz" class="download-btn">
                        Download for Linux (.tar.xz)
                    </a>
                `;
            } else {
                contentDiv.innerHTML = `
                    <div class="unsupported">
                        Sorry, your operating system is not currently supported. We currently only offer builds for Windows and Linux.
                    </div>
                `;
            }
        });
    </script>

</body>
</html>
